services:
  app:
    image: docker.io/gwcarti/timetracker:latest
    container_name: temptracker
    env_file:
      - .env
    environment:
      # Provide sensible defaults if not present in .env
      FLASK_PORT: "${FLASK_PORT:-5000}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      SECRET_KEY: "${SECRET_KEY:-dev}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/app.db}"
    ports:
      - "${FLASK_PORT:-5000}:${FLASK_PORT:-5000}"
    volumes:
      - ./data:/app/data
      - ./data/uploads:/app/static/uploads
    restart: unless-stopped

volumes: {}
