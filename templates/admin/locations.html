{% extends 'base.html' %}
{% block content %}
<h1>Locations</h1>
<ul>
  {% for loc in locations %}
    <li>{{ loc.name }} <a href="{{ url_for('delete_location', location_id=loc.id) }}">Delete</a></li>
  {% else %}
    <li>No locations.</li>
  {% endfor %}
</ul>
<h2>Add Location</h2>
<form method="post">
  <div class="form-group">
    <input class="input" type="text" name="name" placeholder="Location name" required>
  </div>
  <div class="form-group">
    <button class="btn" type="submit">Add</button>
  </div>
</form>
{% endblock %}
