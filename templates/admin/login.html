{% extends 'base.html' %}
{% block content %}
<h1>Admin Login</h1>
<form method="post">
  <div class="form-group">
    <input class="input" type="password" name="password" placeholder="Password" required>
  </div>
  <div class="form-group">
    <button class="btn" type="submit">Login</button>
  </div>
</form>
{% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
{% endblock %}
