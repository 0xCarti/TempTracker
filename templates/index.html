{% extends 'base.html' %}
{% block mobile_header %}{% endblock %}
{% block content %}
<style>
@media (max-width: 1024px) {
  nav.navbar { display: flex !important; }
  .mobile-header { display: none !important; }
  .loc-list { list-style: none; padding: 0; margin: 0; }
  .loc-list li { margin-bottom: 10px; }
  .loc-link { display: block; width: 100%; text-align: center; text-decoration: none; padding: 12px 16px; border-radius: 6px; color: #fff; background: var(--bs-primary, #0d6efd); }
  .loc-link:hover, .loc-link:active { color: #fff; background: #0b5ed7; }
}
</style>
<h1>Locations</h1>
<form method="get" class="mb-3">
  <select name="tag" class="input" onchange="this.form.submit()">
    <option value="">All Tags</option>
    {% for t in tags %}
      <option value="{{ t }}" {% if current_tag==t %}selected{% endif %}>{{ t }}</option>
    {% endfor %}
  </select>
</form>
<ul class="loc-list">
  {% for loc in locations %}
    <li><a class="loc-link" href="{{ url_for('location_page', location_id=loc.id) }}">{{ loc.name }}</a></li>
  {% else %}
    <li>No locations yet.</li>
  {% endfor %}
</ul>
{% endblock %}
