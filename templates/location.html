{% extends 'base.html' %}
{% block content %}
<div class="d-none d-sm-flex justify-content-between align-items-center mb-2">
  <a class="btn btn-primary" href="{{ url_for('index') }}" role="button">← Back</a>
  <h1 class="m-0">{{ location.name }} - Coolers</h1>
  <span></span>
</div>

{% if location.image_path %}
<img src="{{ url_for('static', filename=location.image_path) }}" alt="{{ location.name }}" style="max-width:100%;height:auto;border-radius:8px;margin-bottom:10px;" loading="lazy">
{% endif %}

<div class="cooler-list">
  {% for c in coolers %}
    <a class="cooler-card" href="{{ url_for('cooler_page', cooler_id=c.id) }}">
      {% if c.image_path %}
        <img class="cooler-img" src="{{ url_for('static', filename=c.image_path) }}" alt="{{ c.name }}" loading="lazy">
      {% else %}
        <div class="cooler-placeholder">{{ c.name }}</div>
      {% endif %}
      <div class="cooler-name">{{ c.name }}</div>
    </a>
  {% else %}
    <p>No coolers yet.</p>
  {% endfor %}
  </div>

<style>
/* Mobile-first vertical list */
.cooler-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
.cooler-card { display: block; text-decoration: none; color: inherit; }
.cooler-img, .cooler-placeholder { width: 100%; aspect-ratio: 1 / 1; border-radius: 8px; overflow: hidden; background: #f1f3f5; display: grid; place-items: center; }
.cooler-img { object-fit: cover; }
.cooler-placeholder { font-weight: 600; color: #495057; text-align: center; padding: 10px; }
.cooler-name { margin-top: 6px; font-weight: 600; }

/* On larger screens, show a grid */
@media (min-width: 600px) {
  .cooler-list { grid-template-columns: repeat(3, 1fr); }
}
</style>
{% endblock %}
